version: '3.8'

services:
  backend:
    container_name: rust-server
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - CLICKHOUSE_URL=http://clickhouse:8123
      - DATABASE_URL=postgres://beaker:beaker@postgres:5432/beaker
      - RUST_LOG=info
      - TRACKING_API_KEY=track_42c7ada0-a530-40cc-a896-1260b9dadf86
      - FEATURE_FLAGS_API_KEY=flags_2e2713d8-b755-40c9-9763-e45fbefe53ce
      - SESSION_TTL_MINUTES=30
      - LITELLM_BASE_URL=http://litellm:4000/v1
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_DEFAULT_MODEL=${LITELLM_DEFAULT_MODEL:-gpt-4o-mini}
      - LITELLM_MODELS=${LITELLM_MODELS:-gpt-4o-mini,gpt-3.5-turbo}
      - JWT_SECRET=${JWT_SECRET:-change-me}
      - JWT_TTL_MINUTES=60
      - ALLOW_DEV_OTP=1
      - SMTP_HOST=mailpit
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=no-reply@beaker.local
      - LOG_ONLY_OTP=0
      - DEFAULT_ADMIN_EMAIL=admin@beaker.local
      - DEFAULT_ADMIN_PASSWORD=admin
      - MCP_ENABLED=true
      - MCP_API_KEY=${MCP_API_KEY:-}
      - MCP_ACCOUNT_ID=${MCP_ACCOUNT_ID:-}
      - AI_POLLING_ENABLED=true
      - AI_POLLING_INTERVAL_MINUTES=15
      - AI_AUTO_STOP_REGRESSIONS=false
      - AI_SEVERE_REGRESSION_THRESHOLD=-0.10
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - beaker-network
    restart: always

  frontend:
    container_name: nestjs-app
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - backend
    environment:
      - VITE_TRACKING_KEY=track_42c7ada0-a530-40cc-a896-1260b9dadf86
    networks:
      - beaker-network
    restart: always

  clickhouse:
    container_name: clickhouse-db
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123" # HTTP port
      - "9000:9000" # Native port
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/config.d:/etc/clickhouse-server/config.d
      - ./clickhouse/users.d:/etc/clickhouse-server/users.d
    networks:
      - beaker-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    container_name: beaker-postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=beaker
      - POSTGRES_PASSWORD=beaker
      - POSTGRES_DB=beaker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - beaker-network
    restart: unless-stopped

  mailpit:
    container_name: beaker-mailpit
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - beaker-network
    restart: unless-stopped

  postgres-test:
    container_name: beaker-postgres-test
    image: postgres:16-alpine
    profiles: ["test"]
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpass
      - POSTGRES_DB=testdb
    ports:
      - "5433:5432"
    volumes:
      - ./scripts/test_postgres_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - beaker-network
    restart: unless-stopped

  litellm:
    container_name: litellm-proxy
    image: ghcr.io/berriai/litellm:main-latest
    profiles: ["ai"]
    ports:
      - "4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    command: ["--port", "4000", "--config", "/app/config.yaml"]
    networks:
      - beaker-network
    restart: unless-stopped

networks:
  beaker-network:
    driver: bridge

volumes:
  clickhouse_data:
  postgres_data:
  postgres_test_data:
