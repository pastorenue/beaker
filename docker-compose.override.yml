services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: builder
    working_dir: /app
    command: sh -c "npm install --no-package-lock && npm run dev -- --host 0.0.0.0 --port 3001"
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - ./sdk:/sdk
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_TRACKING_KEY=track_42c7ada0-a530-40cc-a896-1260b9dadf86
    depends_on:
      - backend

volumes:
  frontend_node_modules:
